name: Manual Deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag to deploy (leave empty for latest)'
        required: false
        type: string
      skip_tests:
        description: 'Skip tests and security scans'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  NODE_VERSION: '20'
  PNPM_VERSION: '9.4.0'
  ENVIRONMENT: 'prod'
  NAMESPACE: 'prod-regai'

jobs:
  validate-inputs:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Validate branch is main
        run: |
          if [ "${{ github.ref_name }}" != "main" ]; then
            echo "❌ Manual deployment is only allowed from the main branch!"
            echo "Current branch: ${{ github.ref_name }}"
            echo "Please switch to main branch and try again."
            exit 1
          fi
          echo "✅ Deploying from main branch"
          
      - name: Determine image tag
        id: tag
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            echo "tag=${{ inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=sha-${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Validate image exists
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}"
          echo "Checking if image exists: $IMAGE"
          # We'll attempt to pull the image to verify it exists
          docker manifest inspect "$IMAGE" > /dev/null 2>&1 || {
            echo "❌ Image $IMAGE does not exist in registry"
            echo "Available tags:"
            curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://ghcr.io/v2/${{ github.repository }}/tags/list" | jq -r '.tags[]' | head -10
            exit 1
          }
          echo "✅ Image $IMAGE exists and is ready for deployment"

  quick-test:
    runs-on: ubuntu-latest
    needs: validate-inputs
    if: ${{ !inputs.skip_tests }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Quick smoke test
        run: |
          echo "Running quick validation tests..."
          # Add any quick validation tests here
          echo "✅ Smoke tests passed"

  deploy:
    runs-on: ubuntu-latest
    needs: [validate-inputs, quick-test]
    if: always() && github.ref == 'refs/heads/main' && needs.validate-inputs.result == 'success' && (needs.quick-test.result == 'success' || needs.quick-test.result == 'skipped')
    environment:
      name: prod
      url: ${{ vars.APP_BASE_URL || 'http://reginforceai.mahahrishi.com' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: '3.12.0'

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: '1.28.0'

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy to production
        run: |
          # Validate we're on main branch (double-check)
          if [ "${{ github.ref_name }}" != "main" ]; then
            echo "❌ Production deployment blocked - not on main branch!"
            exit 1
          fi
          
          # Use environment-based namespace
          NAMESPACE="${{ env.NAMESPACE }}"
          RELEASE_NAME="reginforce-frontend"

          HOST="reginforceai.mahahrishi.com"
          # Use GitHub environment variable for API communication
          API_BASE_URL="${{ vars.API_BASE_URL }}"

          echo "🚀 Deploying to production environment"
          echo "🌐 Host: $HOST"
          echo "🔗 API Base URL: $API_BASE_URL"
          echo "📦 Using image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.validate-inputs.outputs.image_tag }}"

          helm upgrade --install "$RELEASE_NAME" ./helm/reginforce-ai-frontend \
            --namespace "$NAMESPACE" \
            --create-namespace \
            --values ./helm/reginforce-ai-frontend/values-k3s.yaml \
            --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
            --set image.tag=${{ needs.validate-inputs.outputs.image_tag }} \
            --set ingress.hosts[0].host="$HOST" \
            --set ingress.tls[0].hosts[0]="$HOST" \
            --set env[0].name="NODE_ENV"
            --set env[0].value="production"
            --set env[1].name="VITE_API_BASE_URL"
            --set env[1].value="$API_BASE_URL"
            --set replicaCount=2 \
            --set resources.requests.cpu=50m \
            --set resources.requests.memory=64Mi \
            --set resources.limits.cpu=100m \
            --set resources.limits.memory=128Mi \
            --wait --timeout=600s

      - name: Verify deployment
        run: |
          NAMESPACE="${{ env.NAMESPACE }}"
          RELEASE_NAME="reginforce-frontend"

          echo "✅ Verifying deployment..."
          kubectl rollout status deployment/"$RELEASE_NAME" -n "$NAMESPACE" --timeout=300s
          kubectl get pods -n "$NAMESPACE" -l app.kubernetes.io/instance="$RELEASE_NAME"
          
          echo "🔗 Application URLs:"
          kubectl get ingress -n "$NAMESPACE"

      - name: Create deployment annotation
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: '${{ inputs.environment }}',
              description: 'Manual deployment via GitHub Actions',
              auto_merge: false,
              required_contexts: []
            });

  notify-deployment:
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always()
    steps:
      - name: Create summary
        run: |
          echo "## 🚀 Manual Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY  
          echo "**Image Tag:** ${{ needs.validate-inputs.outputs.image_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ needs.deploy.result == 'success' && '✅ Success' || '❌ Failed' }}" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** ${{ inputs.environment == 'production' && 'https://reginforce.example.com' || 'https://staging.reginforce.example.com' }}" >> $GITHUB_STEP_SUMMARY

      - name: Notify on Slack
        if: always() && env.SLACK_WEBHOOK != ''
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ needs.deploy.result }}
          channel: '#deployments'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
          fields: repo,message,commit,author,action,eventName,ref,workflow
          custom_payload: |
            {
              text: `Manual deployment to ${{ inputs.environment }} ${{ needs.deploy.result == 'success' && 'succeeded' || 'failed' }}`,
              attachments: [{
                color: '${{ needs.deploy.result == 'success' && 'good' || 'danger' }}',
                fields: [{
                  title: 'Environment',
                  value: '${{ inputs.environment }}',
                  short: true
                }, {
                  title: 'Image Tag', 
                  value: '${{ needs.validate-inputs.outputs.image_tag }}',
                  short: true
                }, {
                  title: 'Triggered by',
                  value: '@${{ github.actor }}',
                  short: true
                }]
              }]
            }
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
